<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>編集</title>
</head>
<body>
<div class="header-contents">
    <h2>タスク編集</h2>
</div>
<div class="main-contents">
    <form th:action="@{/task/update/{id}(id=${taskModel.id})}" th:object="${taskModel}" th:method="POST">
        <div class="task-area">
            <span th:if="${#fields.hasErrors('content')}" th:errors="*{content}">
            </span>
            <label>タスク内容</label>
            </br>
            <textarea class="task-box" name="task" th:field="*{content}" rows="4" cols="20" /></textarea><br/>
            <label>タスク期限</label>
            </br>
            <input type="date" class="limitDate-box" th:text="${taskModel.limitDate}" />
            </br>
            <input type="hidden" th:field="*{id}" />
            <input type="submit" value="編集"/>
        </div>
    </form>
</div>
<div class="footer-contents">
    <form action="/">
        <input type="submit" value="戻る" />
    </form>
</div>
</body>
</html>
