<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>タスク追加</title>
</head>
<body>
<div class="header-contents">
    <h2>タスク追加</h2>
</div>
</br>
<div class="main-contents">
    <form method="post" action="/add" th:object="${taskModel}">
        <div class="task-area">
            <span th:if="${#fields.hasErrors('content')}" th:errors="*{content}">
            </span>
            <label>タスク内容</label>
            </br>
            <textarea class="task-box" th:field="*{content}" size="100" maxlength="500" ></textarea><br/>
            </br>
            <label>タスク期限</label>
            </br>
            <input type="date" class="limit-Date-box" th:field="*{limitDate}" /></br>
            </br>
            <input type="submit" value="追加" />
        </div>
    </form>
</div>
<div class="footer-contents">
    <form action="/">
        <input type="submit" value="戻る" />
    </form>
</div>
</body>
</html>
